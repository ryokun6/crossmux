[platformio]
default_envs = default
build_cache_dir = .cache
extra_configs = platformio.local.ini

[crosspoint]
version = 1.4.4

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort,--wrap=bootloader_common_check_efuse_blk_validity
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Source filter: by default exclude Chinese-only content. Environments that
; define ENABLE_CHINESE_VERSION must add it back via build_src_filter.
; Extra game apps are excluded from all builds (kept out of firmware).
build_src_filter =
  +<*>
  -<.git/>
  -<.svn/>
  -<activities/apps/2048/>
  -<activities/apps/avatar/>
  -<activities/apps/cellular/>
  -<activities/apps/chinese-chess/>
  -<activities/apps/gomoku/>
  -<activities/apps/minesweeper/>
  -<activities/apps/sudoku/>
  -<activities/apps/weread/>

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py
  post:scripts/register_unit_tests_target.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ 1.1.6
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3
  knolleary/PubSubClient @ ^2.8

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (includes branch + short SHA)
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG

; Traditional Chinese release (zh-TW): ENABLE_CHINESE_VERSION + TC UI/fonts.
; Built-in CJK fonts cover the top 3500 most-common modern Chinese characters
; (Traditionalized) at 8/10/12/14pt, plus an i18n-only subset at 16pt/18pt.
; With -flto=auto the firmware fits the default dual-OTA partition table.
[env:gh_release_tc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-tc\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DENABLE_CHINESE_VERSION
  ; LTO: cross-TU dead-code elimination on project sources + locally rebuilt
  ; Arduino core (~140 KB off .text). Framework default link flags include
  ; -fno-lto (stripped below). Pre-built framework .a libs stay non-LTO; the
  ; GCC linker plugin handles the mix.
  -flto=auto
build_unflags =
  ${base.build_unflags}
  -fno-lto
build_src_filter =
  ${base.build_src_filter}
  +<activities/apps/weread/>

; Traditional Chinese nightly / RC (CROSSPOINT_RC_HASH from nightly workflow).
[env:gh_release_tc_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-tc-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DENABLE_CHINESE_VERSION
  -flto=auto
build_unflags =
  ${base.build_unflags}
  -fno-lto
build_src_filter =
  ${base.build_src_filter}
  +<activities/apps/weread/>

; Simplified Chinese release (zh-CN): same CJK gates as TC, plus
; CHINESE_UI_SIMPLIFIED (SC UI strings via gen_i18n t2s, SC fonts, Tc→Sc remap).
[env:gh_release_sc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-sc\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DENABLE_CHINESE_VERSION
  -DCHINESE_UI_SIMPLIFIED
  -flto=auto
build_unflags =
  ${base.build_unflags}
  -fno-lto
build_src_filter =
  ${base.build_src_filter}
  +<activities/apps/weread/>

; Simplified Chinese nightly / RC.
[env:gh_release_sc_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-sc-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DENABLE_CHINESE_VERSION
  -DCHINESE_UI_SIMPLIFIED
  -flto=auto
build_unflags =
  ${base.build_unflags}
  -fno-lto
build_src_filter =
  ${base.build_src_filter}
  +<activities/apps/weread/>
