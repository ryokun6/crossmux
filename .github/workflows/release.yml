name: Compile Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      # OpenCC tw2sp synthesizes ZH_CN UI strings for gh_release_sc (gen_i18n.py).
      - name: Install OpenCC
        run: uv pip install --system OpenCC

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Build ryOS CrossMux (international + TC + SC + JA + KO)
        run: pio run -e gh_release -e gh_release_tc -e gh_release_sc -e gh_release_ja -e gh_release_ko

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp .pio/build/gh_release/firmware.bin     dist/firmware.bin
          cp .pio/build/gh_release/bootloader.bin   dist/bootloader.bin
          cp .pio/build/gh_release/partitions.bin   dist/partitions.bin
          cp .pio/build/gh_release_tc/firmware.bin  dist/firmware-tc.bin
          cp .pio/build/gh_release_sc/firmware.bin  dist/firmware-sc.bin
          cp .pio/build/gh_release_ja/firmware.bin  dist/firmware-ja.bin
          cp .pio/build/gh_release_ko/firmware.bin  dist/firmware-ko.bin

      # Build a complete commit-level changelog. GitHub's built-in
      # generate_release_notes only lists PR merges, so any commit pushed
      # straight to main is missing from the release body. git log gives us
      # the full picture; the 7-char hashes are auto-linked to commits by
      # the GitHub release renderer.
      - name: Build changelog
        run: |
          set -euo pipefail
          # Ignore the rolling `nightly` tag and compare against the newest
          # reachable numeric stable release.
          PREV_TAG=$(git tag --merged HEAD^ --list '[0-9]*.[0-9]*.[0-9]*' \
            --sort=-version:refname | sed -n '1p')
          {
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since ${PREV_TAG}"
              echo ""
              git log --pretty=format:"- %s (\`%h\`)" --reverse "${PREV_TAG}..HEAD"
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
            else
              echo "## Initial release ${{ github.ref_name }}"
            fi
          } > release-body.md
          echo "---- release-body.md ----"
          cat release-body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          body_path: release-body.md

      # Mirror the SAME binaries to Gitee so mainland-China users / device OTA
      # download from Gitee's CN CDN (see scripts/publish-gitee-release.sh).
      # Best-effort: never blocks the GitHub release. Needs the GITEE_TOKEN
      # secret (Gitee private token, `projects` scope).
      - name: Mirror release to Gitee (China)
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          bash scripts/publish-gitee-release.sh \
            "x1abin/crossmux" \
            "${{ github.ref_name }}" \
            "ryOS CrossMux ${{ github.ref_name }}" \
            "false" \
            "${{ github.sha }}" \
            "release-body.md" \
            dist/firmware.bin dist/firmware-tc.bin dist/firmware-sc.bin dist/firmware-ja.bin dist/firmware-ko.bin dist/bootloader.bin dist/partitions.bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ryOS-CrossMux-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin
            .pio/build/gh_release_tc/firmware.bin
            .pio/build/gh_release_sc/firmware.bin
            .pio/build/gh_release_ja/firmware.bin
            .pio/build/gh_release_ko/firmware.bin
