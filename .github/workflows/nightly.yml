name: Nightly

# Daily rolling nightly build of main, published as a prerelease tagged
# `nightly` with international (firmware.bin), Traditional (firmware-tc.bin),
# Simplified (firmware-sc.bin), Japanese (firmware-ja.bin), and Korean
# (firmware-ko.bin) assets. The website's Insider/Nightly reads the newest prerelease.
on:
  schedule:
    - cron: '0 18 * * *' # daily 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      # OpenCC tw2sp synthesizes ZH_CN UI strings for gh_release_sc_rc (gen_i18n.py).
      - name: Install OpenCC
        run: uv pip install --system OpenCC

      - name: Extract short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build ryOS CrossMux Nightly (international + TC + SC + JA + KO)
        env:
          CROSSPOINT_RC_HASH: ${{ env.SHORT_SHA }}
        run: pio run -e gh_release_rc -e gh_release_tc_rc -e gh_release_sc_rc -e gh_release_ja_rc -e gh_release_ko_rc

      - name: Stage nightly assets
        run: |
          mkdir -p dist
          cp .pio/build/gh_release_rc/firmware.bin     dist/firmware.bin
          cp .pio/build/gh_release_tc_rc/firmware.bin  dist/firmware-tc.bin
          cp .pio/build/gh_release_sc_rc/firmware.bin  dist/firmware-sc.bin
          cp .pio/build/gh_release_ja_rc/firmware.bin  dist/firmware-ja.bin
          cp .pio/build/gh_release_ko_rc/firmware.bin  dist/firmware-ko.bin

      # Roll the single `nightly` release/tag forward to the current commit.
      - name: Remove previous nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ryOS CrossMux Nightly (${{ env.SHORT_SHA }})
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            Rolling nightly build from `main` (${{ env.SHORT_SHA }}).
            - `firmware.bin` — international
            - `firmware-tc.bin` — Traditional Chinese (繁體中文)
            - `firmware-sc.bin` — Simplified Chinese (简体中文)
            - `firmware-ja.bin` — Japanese (日本語)
            - `firmware-ko.bin` — Korean (한국어)

      # Roll the same nightly binaries onto Gitee for the China mirror. The
      # script deletes the previous Gitee `nightly` release and recreates it.
      # Best-effort: never blocks the GitHub nightly. Needs the GITEE_TOKEN secret.
      - name: Mirror nightly to Gitee (China)
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          printf '%s\n' "Rolling nightly build from main (${{ env.SHORT_SHA }})." > gitee-nightly-body.md
          bash scripts/publish-gitee-release.sh \
            "x1abin/crossmux" \
            "nightly" \
            "ryOS CrossMux Nightly (${{ env.SHORT_SHA }})" \
            "true" \
            "${{ github.sha }}" \
            "gitee-nightly-body.md" \
            dist/firmware.bin dist/firmware-tc.bin dist/firmware-sc.bin dist/firmware-ja.bin dist/firmware-ko.bin
